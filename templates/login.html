{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center
justify-center">
        <div class="bg-white p-8 rounded-lg
        shadow-mid w-full max-w-md">

            <h1 class="text-3xl font-bold text-center mb-6">
                Tuzmore CRM
            </h1>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <button type="submit" class="w-full bg-blue-6000
                text-white py-2 rounded mt-4">
                    Login

                </button>
            </form>

        </div>

</div>

{% endblock %}
