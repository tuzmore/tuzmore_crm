{% extends "base.html" %}
{% block content %}

<h1>{{ deal.title }}</h1>
<p>{{ deal.contact }}</p>
<p>{{deal.company }}</p>
<p>{{ deal.stage }}</p>
<p>{{ deal.value }}</p>

<a href="{% url 'deal_update' deal.pk %}"
class="bg-blue-600 text-white px-4 py-2  rounded">
    Edit
</a>

<a href="{% url 'deal_delete' deal.pk %}"
    class="bg-red-500 text-white px-4 py-2 rounded">
    Delete
</a>

{% endblock %}
