{% extends "base.html" %}
{% block content %}

<h1 class="text-3xl font-bold">
    {{ company.name }}
</h1>

<p>{{ company.email }}</p>
<p>{{ company.phone }}</p>
<p>{{ company.website }}</p>
<p>{{ company.industry }}</p>
<p>{{ company.address }}</p>

<a href="{% url 'company_update' company.pk %}">
    Edit
</a>

{% endblock %}
