
services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    command: > 
        sh -c "python manage.py migrate &&
              python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: tuzmore_db
      POSTGRES_USER: tuzmore_user
      POSTGRES_PASSWORD: tuzmore_pass

volumes:
  postgres_data: