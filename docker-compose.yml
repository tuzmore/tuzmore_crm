version: "3.9"

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: tuzmore_db
      POSTGRES_USER: tuzmore_user
      POSTGRES_PASSWORD: tuzmore_pass

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data: